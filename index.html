<!doctype html>
<html lang="es">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Proyecto III</title>
        <link rel="stylesheet" href="./css/style.css">
        <script src="https://kit.fontawesome.com/63b0c67427.js" crossorigin="anonymous" defer></script>
        <script src="./js/main.js" defer></script>
    </head>

    <body>
        <header class="header">
            <div class="wrapper">
                <div class="logo">
                    <a href="#">PhotoTeam</a>
                </div>
                <form class="search-box">
                    <input type="search" placeholder="Search our gallery..." aria-label="Buscar imágenes">
                    <i class="fa-solid fa-magnifying-glass"></i>
                </form>
            </div>
        </header>

        <main class="slider-container">

            <!-- PREV -->

            <button class="arrow prev" aria-label="Slide anterior">
                <i class="fa-solid fa-chevron-left"></i>
            </button>

            <!-- SLIDES -->

            <div class="slides">

                <!-- TEMPLATE 1 -->

                <section class="slide active">
                    <div class="gallery">
                        <div class="gallery-main">
                            <img src="https://picsum.photos/id/316/900/600" class="main-image" alt="Fotografía principal" loading="lazy">
                        </div>

                        <div class="gallery-list">
                            <img src="https://picsum.photos/id/316/300/300" class="thumb active-thumb" alt="Vista previa 1" loading="lazy">
                            <img src="https://picsum.photos/id/184/300/300" class="thumb" alt="Vista previa 2" loading="lazy">
                            <img src="https://picsum.photos/id/171/300/300" class="thumb" alt="Vista previa 3" loading="lazy">
                            <img src="https://picsum.photos/id/194/300/300" class="thumb" alt="Vista previa 4" loading="lazy">
                        </div>
                    </div>
                </section>

                <!-- TEMPLATE 2 -->

                <section class="slide">
                    <div class="grid-gallery">
                        <img src="https://picsum.photos/id/204/500/500" class="grid-img" alt="Playa" loading="lazy">
                        <img src="https://picsum.photos/id/203/500/500" class="grid-img" alt="Bosque" loading="lazy">
                        <img src="https://picsum.photos/id/208/500/500" class="grid-img" alt="Paisaje" loading="lazy">
                        <img src="https://picsum.photos/id/196/500/500" class="grid-img" alt="Montañas" loading="lazy">
                        <img src="https://picsum.photos/id/296/500/500" class="grid-img" alt="Carretera" loading="lazy">
                        <img src="https://picsum.photos/id/314/500/500" class="grid-img" alt="Atardecer" loading="lazy">
                        <img src="https://picsum.photos/id/323/500/500" class="grid-img" alt="Naturaleza" loading="lazy">
                        <img src="https://picsum.photos/id/201/500/500" class="grid-img" alt="Paisaje natural" loading="lazy">
                        <img src="https://picsum.photos/id/202/500/500" class="grid-img" alt="Fotografía urbana" loading="lazy">
                    </div>
                </section>

                <!-- TEMPLATE 3 -->

                <section class="slide">
                    <section class="photo-gallery">
                        <button class="stack-next" id="stack-next" aria-label="Siguiente fotografía">
                            <i class="fa-solid fa-arrow-right"></i>
                        </button>

                        <div class="photo-stack" id="photo-stack">
                            <article class="photo-card">
                                <img src="https://picsum.photos/id/201/500/500" alt="Paisaje urbano" loading="lazy">
                            </article>

                            <article class="photo-card">
                                <img src="https://picsum.photos/id/202/500/500" alt="Montañas" loading="lazy">
                            </article>

                            <article class="photo-card">
                                <img src="https://picsum.photos/id/203/500/500" alt="Bosque" loading="lazy">
                            </article>

                            <article class="photo-card">
                                <img src="https://picsum.photos/id/204/500/500" alt="Playa" loading="lazy">
                            </article>

                            <article class="photo-card">
                                <img src="https://picsum.photos/id/193/500/500" alt="Rocas" loading="lazy">
                            </article>

                            <article class="photo-card">
                                <img src="https://picsum.photos/id/206/500/500" alt="Cielo" loading="lazy">
                            </article>
                        </div>
                    </section>
                </section>
            </div>

            <!-- NEXT -->

            <button class="arrow next" aria-label="Slide siguiente">
                <i class="fa-solid fa-chevron-right"></i>
            </button>
        </main>

        <!-- MODAL -->

        <div class="modal">
            <button class="close-modal" aria-label="Cerrar imagen">
                <i class="fa-solid fa-xmark"></i>
            </button>

            <img src="" class="modal-image" alt="Imagen ampliada">
        </div>
    </body>
</html>
